apiVersion: v1
kind: Secret
metadata:
  name: discord-sky-secrets
  namespace: discord-sky
type: Opaque
stringData:
  Bot__Token: "<replace-with-discord-bot-token>"
  # LLM__ActiveProvider lives in the ConfigMap (discord-sky-config), not here, so the active provider
  # is visible and version-controlled. The ConfigMap value wins because envFrom lists it after this Secret.
  LLM__Providers__OpenAI__ApiKey: "<replace-with-openai-api-key>"
  # Only needed when running the background A/B (LLM__ActiveProvider=xAI). Fine to leave as a
  # placeholder while OpenAI is the active provider.
  LLM__Providers__xAI__ApiKey: "<replace-with-xai-api-key>"
