apiVersion: v1
kind: ConfigMap
metadata:
  name: discord-sky-config
  namespace: discord-sky
data:
  DOTNET_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  Bot__Status: "SnooPING AS usual"
  Bot__CommandPrefix: "!sky"
  Bot__HistoryMessageLimit: "20"
  Bot__MemoryDataPath: "/app/data/user_memories"
  Bot__EnableUserMemory: "true"
  Bot__MaxMemoriesPerUser: "20"
  Bot__MemoryExtractionRate: "1.0"
  Bot__ConversationWindowTimeout: "00:03:00"
  Bot__MaxWindowMessages: "30"
  Bot__MaxWindowDuration: "00:30:00"
  Bot__MaxMemoriesPerExtraction: "15"
  Bot__EnableMemoryConsolidation: "true"
  Bot__ConsolidationTargetPercent: "0.75"
  LLM__Providers__OpenAI__ChatModel: "gpt-5.4"
  LLM__Providers__OpenAI__MaxTokens: "1200"
  LLM__Providers__OpenAI__ReasoningEffort: "medium"
  LLM__Providers__OpenAI__UseResponsesApi: "true"
  Chaos__MaxPromptsPerHour: "20"
  # Recall-tool config (replaces implicit memory relevance gating).
  # See docs/recall_tool_design.md §3 and §4.2.
  MemoryRelevance__RecallTopK: "10"
  MemoryRelevance__MaxRecallsPerReply: "3"
  MemoryRelevance__MaxRecallsPerAmbientReply: "1"
  MemoryRelevance__SuppressionOverlapThreshold: "0.3"
  # Legacy keys below are unused under the recall-tool design but kept to avoid
  # breaking option binding during rollout. Remove after one stable release.
  MemoryRelevance__Mode: "ShadowOnly"
  MemoryRelevance__HardFloor: "0.15"
  MemoryRelevance__AdmissionThreshold: "0.35"
  MemoryRelevance__ConfidenceGap: "2.0"
  MemoryRelevance__MaxInjectedMemories: "2"
  MemoryRelevance__LateralInhibition: "0.5"
  MemoryRelevance__RecentMessageWindow: "3"
  MemoryRelevance__KindAmbientThreshold__Factual: "0.35"
  MemoryRelevance__KindAmbientThreshold__Experiential: "0.85"
  MemoryRelevance__KindAmbientThreshold__Running: "999999"
  MemoryRelevance__KindAmbientThreshold__Meta: "999999"
