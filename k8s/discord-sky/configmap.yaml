apiVersion: v1
kind: ConfigMap
metadata:
  name: discord-sky-config
  namespace: discord-sky
data:
  DOTNET_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  Bot__Status: "SnooPING AS usual"
  Bot__CommandPrefix: "!sky"
  Bot__HistoryMessageLimit: "20"
  Bot__MemoryDataPath: "/app/data/user_memories"
  Bot__EnableUserMemory: "true"
  Bot__MaxMemoriesPerUser: "30"
  Bot__MemoryExtractionRate: "1.0"
  Bot__ConversationWindowTimeout: "00:03:00"
  Bot__MaxWindowMessages: "30"
  Bot__MaxWindowDuration: "00:30:00"
  Bot__MaxMemoriesPerExtraction: "15"
  Bot__EnableMemoryConsolidation: "true"
  Bot__ConsolidationTargetPercent: "0.75"
  # gpt-5.5 (OpenAI) is the primary provider for everything. This ConfigMap value overrides the
  # Secret (the Deployment lists configMapRef after secretRef in envFrom, so the ConfigMap wins),
  # keeping production on OpenAI even if the out-of-band Secret still names another provider.
  LLM__ActiveProvider: "OpenAI"
  LLM__Providers__OpenAI__ChatModel: "gpt-5.5"
  LLM__Providers__OpenAI__MaxTokens: "1200"
  LLM__Providers__OpenAI__ReasoningEffort: "medium"
  LLM__Providers__OpenAI__UseResponsesApi: "true"
  # xAI/Grok, wired for background A/B experimentation only (fun_assessment 3.10). NOT active.
  # To run the experiment: set LLM__ActiveProvider=xAI (and put the key in the Secret as
  # LLM__Providers__xAI__ApiKey), redeploy, then score transcripts with tools/DiscordSky.FunScore.
  # grok-4.20-0309-reasoning is the most advanced model available; the non-reasoning sibling is the
  # cheaper choice for background memory extraction.
  LLM__Providers__xAI__Endpoint: "https://api.x.ai/v1"
  LLM__Providers__xAI__ChatModel: "grok-4.20-0309-reasoning"
  LLM__Providers__xAI__MemoryExtractionModel: "grok-4.20-0309-non-reasoning"
  LLM__Providers__xAI__MaxTokens: "1200"
  LLM__Providers__xAI__UseResponsesApi: "false"
  Chaos__AmbientReplyChance: "0.25"
  Chaos__MaxPromptsPerHour: "20"
  # Telemetry sink path. MUST live inside the PVC mount; the PVC is mounted at
  # /app/data/user_memories so we nest telemetry there. Without this override the
  # default would resolve to /app/data/telemetry which is on ephemeral storage and
  # would be wiped on every pod restart. See docs/recall_feature_review_2026-05-26.md §7.1.
  Telemetry__BaseDirectory: "/app/data/user_memories/telemetry"
  Telemetry__RetentionDays: "30"
  # Conversation transcript logging (full prompt + reply) for quality evaluation. Nested inside the
  # PVC mount so it survives pod rotation. Contains raw user content and IDs by design; retention is
  # shorter than telemetry because content is larger. See docs/improvement_opportunities_2026-06-10.md H2.
  Transcript__Enabled: "true"
  Transcript__BaseDirectory: "/app/data/user_memories/transcripts"
  Transcript__RetentionDays: "14"
  # Reaction logging (the reception signal): which reactions land on the bot's own messages. Nested in
  # the PVC mount so it survives pod rotation. Low-sensitivity (emoji + IDs + a short reply excerpt).
  Reactions__Enabled: "true"
  Reactions__BaseDirectory: "/app/data/user_memories/reactions"
  Reactions__RetentionDays: "30"
  # Image generation (docs/image_generation_design.md). OFF by default: enabling spends real money and
  # requires the OpenAI org to pass API Organization Verification first, plus an OpenAI image API key in
  # the Secret (LLM__Providers__OpenAI__ApiKey is reused). The log lives inside the PVC mount so the
  # durable daily cap and monthly guard survive pod rotation (a crash loop must not blow the budget).
  Image__Enabled: "true"
  Image__Model: "gpt-image-2"
  Image__Size: "1024x1024"
  Image__Quality: "medium"
  Image__SpontaneousModel: "gpt-image-1-mini"
  Image__SpontaneousQuality: "low"
  Image__OutputFormat: "jpeg"
  Image__Moderation: "auto"
  Image__PerUserPerHour: "20"
  Image__GlobalPerDay: "250"
  Image__MaxConcurrent: "20"
  Image__MonthlyUsdGuard: "200"
  Image__AllowHighQuality: "false"
  Image__AmbientChance: "0.25"
  Image__BaseDirectory: "/app/data/user_memories/images"
  Image__RetentionDays: "60"
  # Scam-link guard: proactive in-character warnings on obvious phishing/crypto-scam links.
  ScamGuard__Enabled: "true"
  ScamGuard__CooldownSeconds: "45"
  ScamGuard__TreatShortenersAsSignal: "true"
  # Scan other bots/webhooks (the primary raid vector) plus behavioral raid detection and reporting.
  ScamGuard__ScanBotMessages: "true"
  ScamGuard__NewAccountDays: "7"
  ScamGuard__RaidWindowSeconds: "60"
  ScamGuard__RaidChannelThreshold: "3"
  ScamGuard__RaidRepeatThreshold: "4"
  ScamGuard__AlertChannelName: ""
  ScamGuard__LearnedListPath: "/app/data/user_memories/learned_scams.json"
  # Phishing-domain feed (Sinking Yachts), mirrored locally to the PVC. Fail-open.
  ScamGuard__UsePhishingFeed: "true"
  ScamGuard__PhishingFeedUrl: "https://phish.sinking.yachts"
  ScamGuard__PhishingFeedRefreshMinutes: "15"
  ScamGuard__PhishingFeedIdentity: "discord-sky-bot (private friend server)"
  ScamGuard__PhishingFeedCachePath: "/app/data/user_memories/phishing_domains.json"
  # Recall-tool config (replaces implicit memory relevance gating).
  # See docs/recall_tool_design.md §3 and §4.2.
  MemoryRelevance__RecallTopK: "20"
  MemoryRelevance__MaxRecallsPerReply: "3"
  MemoryRelevance__MaxRecallsPerAmbientReply: "1"
  MemoryRelevance__SuppressionOverlapThreshold: "0.3"
  # Legacy keys below are unused under the recall-tool design but kept to avoid
  # breaking option binding during rollout. Remove after one stable release.
  MemoryRelevance__Mode: "ShadowOnly"
  MemoryRelevance__HardFloor: "0.15"
  MemoryRelevance__AdmissionThreshold: "0.35"
  MemoryRelevance__ConfidenceGap: "2.0"
  MemoryRelevance__MaxInjectedMemories: "2"
  MemoryRelevance__LateralInhibition: "0.5"
  MemoryRelevance__RecentMessageWindow: "3"
  MemoryRelevance__KindAmbientThreshold__Factual: "0.35"
  MemoryRelevance__KindAmbientThreshold__Experiential: "0.85"
  MemoryRelevance__KindAmbientThreshold__Running: "999999"
  MemoryRelevance__KindAmbientThreshold__Meta: "999999"
