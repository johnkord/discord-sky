apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: discord-sky

resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - deployment.yaml

# Secrets are managed out-of-band (Azure Key Vault + CSI driver, or one-shot
# `kubectl create secret`). They are intentionally not part of this kustomization
# so that running deploy.sh never clobbers them. See k8s/discord-sky/README.md.
